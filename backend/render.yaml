services:
  - type: web
    name: esg-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "your-app.onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.onrender.com"
      - key: MYSQL_DATABASE
        fromDatabase:
          name: esg-db
          property: database
      - key: MYSQL_USER
        fromDatabase:
          name: esg-db
          property: user
      - key: MYSQL_PASSWORD
        fromDatabase:
          name: esg-db
          property: password
      - key: MYSQL_HOST
        fromDatabase:
          name: esg-db
          property: host
      - key: MYSQL_PORT
        fromDatabase:
          name: esg-db
          property: port
      - key: REDIS_URL
        fromService:
          name: esg-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: esg-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: esg-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"
      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"
      - key: FRONTEND_URL
        value: "https://your-frontend.onrender.com"
      - key: USE_S3
        value: "False"
      - key: SENTRY_DSN
        value: ""
