<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block subject %}ESG Platform{% endblock %}</title>
  <style>
    body { margin: 0; padding: 0; background: #f9fafb; font-family: Inter, -apple-system, sans-serif; color: #111827; }
    .wrapper { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 12px; overflow: hidden; border: 1px solid #e5e7eb; }
    .header { background: #16a34a; padding: 32px 40px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .body { padding: 40px; }
    .body p { line-height: 1.7; color: #374151; margin: 0 0 16px; }
    .btn { display: inline-block; background: #16a34a; color: #ffffff !important; text-decoration: none; padding: 12px 28px; border-radius: 8px; font-weight: 600; font-size: 15px; margin: 8px 0; }
    .footer { padding: 24px 40px; border-top: 1px solid #f3f4f6; text-align: center; }
    .footer p { font-size: 12px; color: #9ca3af; margin: 0; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>ESG Platform</h1>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>© {% now "Y" %} ESG Platform. All rights reserved.</p>
      <p style="margin-top:4px;">You received this email because you have an account on ESG Platform.</p>
    </div>
  </div>
</body>
</html>
