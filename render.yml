services:
  # 1. The Django Backend
  - type: web
    name: esg-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free # or standard
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: esg-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: esg-redis
          type: redis
          property: connectionString

  # 2. The Celery Worker (for your async PDF reports & notifications)
  - type: worker
    name: esg-celery-worker
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    dockerCommand: celery -A config worker --loglevel=info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: esg-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: esg-redis
          type: redis
          property: connectionString

  # 3. The React Frontend (Static Site - completely free)
  - type: web
    name: esg-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: frontend/dist # or frontend/build depending on your vite/CRA config
    envVars:
      - key: VITE_API_BASE_URL
        value: https://breathe-esg-project-2-jwck.onrender.com/api/v1

# 4. Managed Redis for Celery Broker
  - type: redis
    name: esg-redis
    plan: free
    ipAllowList: [] # Only accessible by your services

# 5. Managed PostgreSQL Database
databases:
  - name: esg-db
    plan: free
